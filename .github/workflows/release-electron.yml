name: Release Electron

on:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win:publish
      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: dist/**
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    needs: build-win
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac:publish
      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: dist/**
          if-no-files-found: warn

